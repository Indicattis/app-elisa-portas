format_version: "11"
default_step_lib_source: https://github.com/bitrise-io/bitrise-steplib.git

project_type: other

workflows:
  # Workflow para Android
  android:
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}
      - nvm@1:
          inputs:
            - node_version: "20"
      - npm@1:
          title: Install dependencies
          inputs:
            - command: install
      - npm@1:
          title: Build Vite app
          inputs:
            - command: run build
      - script@1:
          title: Capacitor Sync Android
          inputs:
            - content: |
                #!/bin/bash
                set -ex
                npx cap sync android
      - android-build@1:
          inputs:
            - project_location: android
            - module: app
            - variant: Release
      - deploy-to-bitrise-io@2: {}

  # Workflow para iOS
  ios:
    steps:
      - activate-ssh-key@4: {}
      - git-clone@8: {}
      - nvm@1:
          inputs:
            - node_version: "20"
      - npm@1:
          title: Install dependencies
          inputs:
            - command: install
      - npm@1:
          title: Build Vite app
          inputs:
            - command: run build
      - script@1:
          title: Capacitor Sync iOS
          inputs:
            - content: |
                #!/bin/bash
                set -ex
                npx cap sync ios
      - cocoapods-install@2:
          inputs:
            - source_root_path: ios/App
      - xcode-archive@5:
          inputs:
            - project_path: ios/App/App.xcworkspace
            - scheme: App
            - distribution_method: app-store
      - deploy-to-bitrise-io@2: {}

  # Workflow completo (Android + iOS)
  deploy_all:
    before_run:
      - android
      - ios

trigger_map:
  - push_branch: main
    workflow: deploy_all
  - pull_request_source_branch: "*"
    workflow: android

app:
  envs:
    - PROJECT_LOCATION: android
    - MODULE: app
    - VARIANT: Release
